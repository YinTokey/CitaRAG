spring:
  application:
    name: cita

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:demo}
      model-name: gpt-5-mini
      temperature: 1.0
    embedding-model:
      api-key: ${OPENAI_API_KEY:demo}
      model-name: text-embedding-3-small
  pinecone:
    api-key: ${PINECONE_API_KEY:demo}
    environment: us-east-1 # Or make this configurable if needed, but user didn't specifying region. Actually "environment" usually is "us-east-1-aws" or similar. But recent Pinecone serverless indexes don't use environment in exactly the same way (it is inferred from API key/index URL but java lib might require it). Let's default or ask. LangChain4j PineconeStore builder usually takes apiKey, environment, projectId, indexName. With serverless, environment can be region. Let's assume standard setup.
    index-name: citarag
