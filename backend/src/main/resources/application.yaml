spring:
  application:
    name: cita

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:demo}
      model-name: gpt-5-mini
      temperature: 1.0
    embedding-model:
      api-key: ${OPENAI_API_KEY:demo}
      model-name: text-embedding-3-small
  milvus:
    host: localhost
    port: 19530
    collection-name: citarag
    dimension: 1536 # text-embedding-3-small default is 1536, but previous code said 512? checking service.
